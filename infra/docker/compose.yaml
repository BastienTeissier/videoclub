services:
  postgres:
    image: postgres:16-alpine
    container_name: videoclub-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-videoclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-videoclub}
      POSTGRES_DB: ${POSTGRES_DB:-videoclub}
    volumes:
      - videoclub-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-videoclub}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  videoclub-pgdata:
